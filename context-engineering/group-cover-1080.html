<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>大模型上下文引擎黑科技 封面（1080x1080）</title>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC","Microsoft YaHei",sans-serif;
      background: #0b0c10;
      padding: 40px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
    }

    .export-header { width: 1080px; display: flex; justify-content: space-between; align-items: center; }
    .export-label { color: #fff; font-size: 20px; font-weight: 800; letter-spacing: 0.5px; }
    .export-btn {
      background: linear-gradient(135deg,#00d2ff,#3a7bd5);
      color: #fff;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 10px 28px rgba(0,210,255,0.25);
    }

    .cover {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      border: 3px solid rgba(255,255,255,0.08);
      box-shadow: 0 26px 70px rgba(0,0,0,0.55);
      background:
        radial-gradient(1100px 900px at 15% 18%, rgba(0,210,255,0.22) 0%, rgba(0,210,255,0) 58%),
        radial-gradient(900px 900px at 85% 82%, rgba(139,92,246,0.16) 0%, rgba(139,92,246,0) 52%),
        radial-gradient(circle at 50% 30%, #171a2a 0%, #0b0c10 70%);
    }

    .grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.045) 2px, transparent 2px),
        linear-gradient(90deg, rgba(255,255,255,0.045) 2px, transparent 2px);
      background-size: 72px 72px;
      opacity: 0.8;
      z-index: 1;
    }

    .glow-top {
      position: absolute;
      top: -230px;
      left: 50%;
      transform: translateX(-50%);
      width: 980px;
      height: 620px;
      background: radial-gradient(ellipse at center, rgba(0, 210, 255, 0.35) 0%, transparent 70%);
      z-index: 2;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.06);
      z-index: 2;
    }
    .ring.r1 { width: 920px; height: 920px; right: -310px; top: -240px; }
    .ring.r2 { width: 1220px; height: 1220px; left: -540px; bottom: -540px; }

    .layer {
      position: relative;
      z-index: 10;
      height: 100%;
      padding: 74px 80px 70px;
      display: flex;
      flex-direction: column;
    }

    .tag {
      align-self: flex-start;
      display: inline-flex;
      gap: 12px;
      align-items: center;
      padding: 12px 22px;
      border-radius: 999px;
      color: #fff;
      font-weight: 900;
      letter-spacing: 1px;
      background: linear-gradient(90deg, rgba(0,210,255,0.95), rgba(58,123,213,0.95));
      border: 2px solid rgba(255,255,255,0.32);
      box-shadow: 0 14px 34px rgba(0,210,255,0.18);
      font-size: 22px;
    }

    .tag .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 0 0 6px rgba(255,255,255,0.18);
    }

    .title {
      margin-top: 62px;
      color: #fff;
      font-weight: 950;
      letter-spacing: 3px;
      line-height: 1.12;
      text-shadow: 0 12px 44px rgba(0,0,0,0.85);
      font-size: 80px;
    }

    .title .en {
      display: block;
      font-size: 38px;
      letter-spacing: 6px;
      font-weight: 900;
      color: rgba(255,255,255,0.84);
      margin-bottom: 18px;
    }

    .title .hl {
      display: inline-block;
      background: linear-gradient(90deg, #00d2ff, #8b5cf6);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 18px rgba(0,210,255,0.55));
    }

    .subtitle {
      margin-top: 26px;
      font-size: 32px;
      font-weight: 850;
      color: rgba(241,245,249,0.92);
      letter-spacing: 1.5px;
      line-height: 1.4;
    }

    .points {
      margin-top: 54px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      padding: 30px 32px;
      border-radius: 26px;
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(0,210,255,0.26);
      backdrop-filter: blur(18px);
      box-shadow: inset 0 0 40px rgba(0,210,255,0.08);
      width: 100%;
    }

    .point { display: flex; align-items: center; gap: 16px; }

    .badge {
      width: 54px;
      height: 54px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 950;
      font-size: 26px;
      color: #00d2ff;
      background: rgba(0,210,255,0.14);
      border: 3px solid rgba(0,210,255,0.85);
      flex-shrink: 0;
    }

    .point span {
      font-size: 32px;
      font-weight: 900;
      color: rgba(241,245,249,0.95);
      letter-spacing: 1.1px;
      line-height: 1.35;
    }

    .point span b {
      color: #00d2ff;
      font-weight: 950;
    }

    .footer {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 20px;
      padding-top: 26px;
      border-top: 2px dashed rgba(0,210,255,0.25);
    }

    .punch {
      font-size: 40px;
      font-weight: 950;
      letter-spacing: 3px;
      color: #00d2ff;
      text-shadow: 0 0 26px rgba(0,210,255,0.55);
      line-height: 1.25;
    }

    .meta {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-end;
      color: rgba(255,255,255,0.78);
      font-weight: 800;
      letter-spacing: 0.6px;
    }

    .meta .line {
      display: inline-flex;
      gap: 10px;
      align-items: center;
      padding: 8px 12px;
      border-radius: 12px;
      background: rgba(0,0,0,0.42);
      border: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(10px);
      font-size: 16px;
    }

    .meta .k { color: rgba(255,255,255,0.62); font-weight: 900; }
    .meta .v { color: rgba(255,255,255,0.92); font-weight: 950; }

    .circuit {
      position: absolute;
      inset: 0;
      z-index: 3;
      opacity: 0.9;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="export-header">
    <div class="export-label">🧩 1080x1080 封面（one-page）</div>
    <button class="export-btn" onclick="exportCover('cover','one-page-cover-1080.jpg')">导出 JPG（<5MB）</button>
  </div>

  <div class="cover" id="cover">
    <div class="glow-top"></div>
    <div class="grid-bg"></div>
    <div class="ring r1"></div>
    <div class="ring r2"></div>

    <svg class="circuit" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#00d2ff" stop-opacity="0.85" />
          <stop offset="1" stop-color="#8b5cf6" stop-opacity="0.35" />
        </linearGradient>
        <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="3" result="b" />
          <feMerge>
            <feMergeNode in="b" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
      </defs>

      <g filter="url(#softGlow)">
        <path d="M120 240 H410 V330 H610" fill="none" stroke="url(#g1)" stroke-width="4" stroke-linecap="round" />
        <circle cx="120" cy="240" r="8" fill="#00d2ff" fill-opacity="0.9" />
        <circle cx="410" cy="330" r="8" fill="#00d2ff" fill-opacity="0.7" />
        <circle cx="610" cy="330" r="7" fill="#8b5cf6" fill-opacity="0.55" />

        <path d="M960 360 H770 V520 H600" fill="none" stroke="url(#g1)" stroke-width="4" stroke-linecap="round" opacity="0.75" />
        <circle cx="960" cy="360" r="8" fill="#8b5cf6" fill-opacity="0.55" />
        <circle cx="770" cy="520" r="7" fill="#00d2ff" fill-opacity="0.55" />

        <path d="M150 860 H360 V720 H520 V620" fill="none" stroke="url(#g1)" stroke-width="4" stroke-linecap="round" opacity="0.85" />
        <circle cx="150" cy="860" r="8" fill="#00d2ff" fill-opacity="0.75" />
        <circle cx="360" cy="720" r="7" fill="#00d2ff" fill-opacity="0.55" />
        <circle cx="520" cy="620" r="6" fill="#8b5cf6" fill-opacity="0.55" />

        <path d="M540 150 V260" fill="none" stroke="rgba(255,255,255,0.16)" stroke-width="3" stroke-linecap="round" />
        <circle cx="540" cy="150" r="7" fill="rgba(255,255,255,0.25)" />
        <circle cx="540" cy="260" r="6" fill="rgba(0,210,255,0.55)" />
      </g>

      <g opacity="0.35">
        <path d="M0 540 H1080" stroke="rgba(255,255,255,0.06)" stroke-width="2" />
        <path d="M540 0 V1080" stroke="rgba(255,255,255,0.06)" stroke-width="2" />
      </g>
    </svg>

    <div class="layer">
      <div class="tag"><span class="dot"></span><span>一页图 · 上下文引擎黑科技（01-07）</span></div>

      <div class="title">
        <span class="en">CONTEXT ENGINEERING</span>
        <span class="hl">让模型只看最有用的 1%</span>
      </div>

      <div class="subtitle">插件化记忆 · 无损压缩 · RAG 过滤 · 工具闭环 —— 让大模型更聪明、更稳定</div>

      <div class="points">
        <div class="point"><div class="badge">01</div><span><b>插槽化</b>：ContextEngine 抽象成可插拔的记忆底座</span></div>
        <div class="point"><div class="badge">02</div><span><b>不丢失</b>：lossless-claw 7 大钩子，全量存储与无损召回</span></div>
        <div class="point"><div class="badge">03</div><span><b>不乱看</b>：Windsurf/Agent 的检索与过滤，让上下文精准注入</span></div>
      </div>

      <div class="footer">
        <div class="punch">上下文管理
          <br />才是 AI 编程的护城河</div>
        <div class="meta">
          <div class="line"><span class="k">尺寸</span><span class="v">1080×1080</span></div>
          <div class="line"><span class="k">合集</span><span class="v">one-page（01-07）</span></div>
          <div class="line"><span class="k">版本</span><span class="v">v1</span></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    async function exportCover(id, fn) {
      const el = document.getElementById(id);
      const btn = event.target;
      const ot = btn.textContent;
      const MAX = 5 * 1024 * 1024;

      btn.textContent = '导出中...';
      btn.disabled = true;

      const attempts = [
        { scale: 2, quality: 0.9 },
        { scale: 2, quality: 0.82 },
        { scale: 1.8, quality: 0.8 },
        { scale: 1.6, quality: 0.78 },
        { scale: 1.5, quality: 0.75 },
      ];

      try {
        for (let i = 0; i < attempts.length; i++) {
          const { scale, quality } = attempts[i];
          btn.textContent = `导出中... (${i + 1}/${attempts.length})`;

          const c = await html2canvas(el, {
            scale,
            backgroundColor: '#0b0c10',
            logging: false,
            useCORS: true,
          });

          const blob = await new Promise((resolve) =>
            c.toBlob((b) => resolve(b), 'image/jpeg', quality)
          );

          if (!blob) continue;
          if (blob.size > MAX && i < attempts.length - 1) continue;

          const u = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.download = fn;
          a.href = u;
          a.click();
          URL.revokeObjectURL(u);

          btn.textContent = blob.size <= MAX ? '✅ 导出成功' : '⚠️ 已导出（可能>5MB）';
          setTimeout(() => {
            btn.textContent = ot;
            btn.disabled = false;
          }, 1800);
          return;
        }

        btn.textContent = '❌ 失败';
        setTimeout(() => { btn.textContent = ot; btn.disabled = false; }, 1600);
      } catch (e) {
        btn.textContent = '❌ 失败';
        setTimeout(() => { btn.textContent = ot; btn.disabled = false; }, 1600);
      }
    }
  </script>
</body>
</html>
